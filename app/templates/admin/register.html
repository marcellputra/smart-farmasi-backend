<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - SEHATI</title>
    <script>
        (function () {
            const key = 'smart-farmasi-admin-theme';
            try {
                const saved = localStorage.getItem(key);
                const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', saved || (systemDark ? 'dark' : 'light'));
            } catch (error) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #F1F5F9;
            --main: #0D9488;       /* Primary clinical Teal */
            --accent: #0EA5E9;     /* Secondary Sky Blue */
            --black: #1E293B;      /* Slate-800 text */
            --white: #FFFFFF;      /* Panel / Card background */
            --border: 1px solid #E2E8F0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        html[data-theme="dark"] {
            --bg: #0B0F19;         /* Medical navy dark background */
            --main: #14B8A6;       /* Bright Teal accent */
            --accent: #38BDF8;     /* Sky blue accent */
            --black: #F8FAFC;      /* White-slate text */
            --white: #111827;      /* Dark Card Background */
            --border: 1px solid #1F2937;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            margin: 0;
            color: var(--black);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .register-card {
            background: var(--white);
            border: var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--main);
            margin-bottom: 1rem;
        }

        h2 {
            font-weight: 800;
            color: var(--black);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #64748B;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
        }

        html[data-theme="dark"] .form-label {
            color: #94A3B8;
        }

        .form-control {
            border-radius: 10px !important;
            padding: 0.75rem 1rem;
            border: var(--border);
            background: var(--white);
            color: var(--black);
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: none !important;
        }

        .form-control:focus {
            border-color: var(--main);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1) !important;
            background: var(--white);
            color: var(--black);
        }

        .btn-primary {
            background: var(--main);
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 700;
            margin-top: 1.5rem;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.15);
            text-transform: uppercase;
            transition: all 0.2s ease;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #0b7c77;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(13, 148, 136, 0.25);
            color: #FFFFFF;
        }

        .divider-text {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
            color: #94A3B8;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .divider-text::before, .divider-text::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--border);
        }

        .divider-text::before { left: 0; }
        .divider-text::after { right: 0; }
        
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #64748B;
            font-weight: 600;
        }

        .login-link a {
            color: var(--main);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .login-link a:hover {
            color: var(--accent);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.85rem;
            border: 1px solid #FCA5A5;
            background: #FEE2E2;
            color: #B91C1C;
        }
    </style>
</head>
<body>
    <div class="container d-flex flex-column align-items-center">
        <div class="register-card">
            <div class="logo-area">
                <img src="/static/app_logo.png" alt="SEHATI Logo" style="width: 52px; height: 52px; border-radius: 12px; object-fit: contain; margin-bottom: 1rem;">
                <h2>Create Admin Account</h2>
                <p class="text-muted">Register a new administrator for the SEHATI system</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="admin@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register Admin</button>
            </form>

            <div class="divider-text">
                <span>OR</span>
            </div>

            <div id="google-button-container" class="d-flex justify-content-center"></div>

            <div class="login-link">
                Already have an account? <a href="{{ url_for('admin_auth.login') }}">Log In</a>
            </div>
        </div>
    </div>
    <script>
        function handleCredentialResponse(response) {
            fetch('/admin/register/google', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ id_token: response.credential }),
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    alert(data.error || 'Google Registration Failed');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('An error occurred during Google Registration.');
            });
        }

        window.onload = function () {
            const adminThemeKey = 'smart-farmasi-admin-theme';
            const theme = localStorage.getItem(adminThemeKey) || document.documentElement.getAttribute('data-theme') || 'light';
            
            google.accounts.id.initialize({
                client_id: "691571373089-t2r3oajabh78af9r1veh4oc5hhb4ebjg.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.getElementById("google-button-container"),
                { theme: theme === 'dark' ? "filled_black" : "outline", size: "large", width: "350", text: "signup_with" } 
            );
        };
    </script>
</body>
</html>
